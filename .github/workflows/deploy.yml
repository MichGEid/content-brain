name: Encrypt & deploy to GitHub Pages

# På hver push til main:
#   1. Bundler index.html + style.css + seed.js + app.js → dist/index.html
#   2. Krypterer dist/index.html med StaticCrypt (passord fra GitHub secret)
#   3. Deployer dist/ til GitHub Pages
#
# Kildekoden på main blir aldri publisert som Pages — bare den krypterte
# bundlen. Det betyr at selv om du ved et uhell pusher en uferdig
# endring, blir det publiserte resultatet alltid kryptert.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build & encrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "::error::Mangler GitHub secret STATICRYPT_PASSWORD"
            exit 1
          fi
          npm run build

      - name: Sanity check — ingen klartekst i dist
        run: |
          if grep -q "SEED_POSTS" dist/index.html; then
            echo "::error::dist/index.html ser ut til å inneholde ukryptert seed-data!"
            exit 1
          fi
          echo "OK — dist/index.html er kryptert."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
